name: Build Installer

# 触发条件：
#   - push 到 main / master：跑构建，产物作为 Artifact 存档
#   - push 形如 v1.2.3 的 tag：构建 + 自动创建 GitHub Release
#   - 手动触发（Actions 页面 Run workflow）
# 每次都产出两种版本：安装包(MacDesktop-Setup-vX.exe) + 免安装单文件(MacDesktop-vX-portable.exe)
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # 创建 Release 需要写权限

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # 从 tag 推导版本号（v1.2.3 -> 1.2.3）；非 tag 构建用 1.0.0
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -like "refs/tags/v*") {
            $v = $ref -replace "refs/tags/v", ""
          } else {
            $v = "1.0.0"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version = $v"

      # 发布真·单文件 self-contained exe
      - name: Publish single-file exe
        run: >
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish-standalone

      # 安装 Inno Setup（runner 自带 choco）
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # 编译安装包，注入版本号
      - name: Build installer
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.ver.outputs.version }}
          installer\MacDesktop.iss
        shell: pwsh

      # 整理发布产物：安装包 + 免安装单文件 exe，统一放入 dist/ 并带版本号命名
      - name: Stage release files
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # 安装包版
          Copy-Item "installer/Output/MacDesktop-Setup.exe" "dist/MacDesktop-Setup-v$v.exe" -Force
          # 免安装（绿色）单文件版，双击即用
          Copy-Item "publish-standalone/MacDesktop.exe" "dist/MacDesktop-v$v-portable.exe" -Force
          Get-ChildItem dist | Format-Table Name, Length

      # 存档产物（所有构建都上传，便于下载测试）：同时含安装包与免安装版
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacDesktop-${{ steps.ver.outputs.version }}
          path: dist/*
          if-no-files-found: error

      # 仅当推送 tag 时创建 Release，同时附带安装包与免安装版
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
