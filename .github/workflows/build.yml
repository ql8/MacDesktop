name: Build Installer

# 触发条件：
#   - push 到 main / master：跑构建，产物作为 Artifact 存档
#   - push 形如 v1.2.3 的 tag：构建 + 自动创建 GitHub Release 并附带安装包
#   - 手动触发（Actions 页面 Run workflow）
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # 创建 Release 需要写权限

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # 从 tag 推导版本号（v1.2.3 -> 1.2.3）；非 tag 构建用 1.0.0
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -like "refs/tags/v*") {
            $v = $ref -replace "refs/tags/v", ""
          } else {
            $v = "1.0.0"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version = $v"

      # 发布真·单文件 self-contained exe
      - name: Publish single-file exe
        run: >
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish-standalone

      # 安装 Inno Setup（runner 自带 choco）
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # 编译安装包，注入版本号
      - name: Build installer
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.ver.outputs.version }}
          installer\MacDesktop.iss
        shell: pwsh

      # 存档产物（所有构建都上传，便于下载测试）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacDesktop-Setup-${{ steps.ver.outputs.version }}
          path: installer/Output/MacDesktop-Setup.exe
          if-no-files-found: error

      # 仅当推送 tag 时创建 Release 并附带安装包
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/MacDesktop-Setup.exe
          generate_release_notes: true
