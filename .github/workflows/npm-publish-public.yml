name: Publish to npmjs.org

# 触发条件：
#   - push 形如 v1.2.3 的 tag：构建 bridge exe + 发布到公共 npmjs.org
#   - 手动触发（Actions 页面 Run workflow，可自定义版本号）
#
# 前置：需在仓库 Settings > Secrets > Actions 添加 NPM_TOKEN
#      （npmjs.org 账号的 Automation / Publish token）。
# 产物：macdesktop（无 scope，公共包），内含预编译 bin/MacDesktop.Bridge.exe，
#      安装方零配置：npm i macdesktop 即可。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "手动发布时的版本号（如 1.2.3），留空则用 1.0.0"
        required: false
        default: ""

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # 从 tag 推导版本号（v1.2.3 -> 1.2.3）；手动触发用输入值，否则 1.0.0
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          $input = "${{ github.event.inputs.version }}"
          if ($ref -like "refs/tags/v*") {
            $v = $ref -replace "refs/tags/v", ""
          } elseif ($input) {
            $v = $input
          } else {
            $v = "1.0.0"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version = $v"

      # 编译 bridge 单文件 self-contained exe 到 npm/bin（会被打进 npm tarball）
      - name: Build bridge exe
        run: >
          dotnet publish bridge/MacDesktop.Bridge.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true -o npm/bin

      # 注入版本号（不改动源 package.json 的其它字段）
      - name: Set version
        shell: pwsh
        working-directory: npm
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = "${{ steps.ver.outputs.version }}"
          $pkg | ConvertTo-Json -Depth 20 | Set-Content package.json -Encoding UTF8
          Write-Host "package = $($pkg.name)@$($pkg.version)"

      - name: Publish to npmjs.org
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
