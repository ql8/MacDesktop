name: Publish npm package

# 触发条件：
#   - push 形如 v1.2.3 的 tag：构建 bridge exe + 发布 npm 包到 GitHub Packages
#   - 手动触发（Actions 页面 Run workflow，可自定义版本号）
#
# 产物：@<owner>/macdesktop，内含预编译的 bin/MacDesktop.Bridge.exe，
#      安装方无需 .NET SDK，开箱即用。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "手动发布时的版本号（如 1.2.3），留空则用 1.0.0"
        required: false
        default: ""

permissions:
  contents: read
  packages: write   # 发布到 GitHub Packages 需要

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          # scope 必须与包名 @<owner> 一致，否则鉴权/路由失败
          scope: "@${{ github.repository_owner }}"

      # 从 tag 推导版本号（v1.2.3 -> 1.2.3）；手动触发用输入值，否则 1.0.0
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          $input = "${{ github.event.inputs.version }}"
          if ($ref -like "refs/tags/v*") {
            $v = $ref -replace "refs/tags/v", ""
          } elseif ($input) {
            $v = $input
          } else {
            $v = "1.0.0"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version = $v"

      # 编译 bridge 单文件 self-contained exe 到 npm/bin（会被打进 npm tarball）
      - name: Build bridge exe
        run: >
          dotnet publish bridge/MacDesktop.Bridge.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true -o npm/bin

      # 动态注入 scope 包名 + 版本号（不改动源 package.json）
      - name: Patch package.json (scope + version)
        shell: pwsh
        working-directory: npm
        run: |
          $owner = "${{ github.repository_owner }}".ToLower()
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.name = "@$owner/macdesktop"
          $pkg.version = "${{ steps.ver.outputs.version }}"
          # 指定发布到 GitHub Packages
          if (-not $pkg.publishConfig) {
            $pkg | Add-Member -NotePropertyName publishConfig -NotePropertyValue ([pscustomobject]@{})
          }
          $pkg.publishConfig = [pscustomobject]@{ registry = "https://npm.pkg.github.com" }
          $pkg | ConvertTo-Json -Depth 20 | Set-Content package.json -Encoding UTF8
          Write-Host "package name = $($pkg.name)@$($pkg.version)"

      - name: Publish to GitHub Packages
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
